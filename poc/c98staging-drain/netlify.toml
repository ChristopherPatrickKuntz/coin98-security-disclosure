[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "*"

# Route internal.c98staging.dev paths to internal listener
[[redirects]]
  from = "/internal/*"
  to = "/.netlify/functions/internal-listener"
  status = 200

# Route adapters paths (Cosmos evidence endpoint)
[[redirects]]
  from = "/adapters/*"
  to = "/.netlify/functions/internal-listener"
  status = 200

# Route dagora auth API paths 
[[redirects]]
  from = "/api/v1/auth/*"
  to = "/.netlify/functions/dagora-listener"
  status = 200

# Route listener log viewer
[[redirects]]
  from = "/api/listener-log"
  to = "/.netlify/functions/listener-log"
  status = 200

# Exfil endpoint for drain PoC data -> Supabase
[[redirects]]
  from = "/api/exfil"
  to = "/.netlify/functions/exfil"
  status = 200

# Existing proxy redirect (keep last so specific routes match first)
[[redirects]]
  from = "/api/proxy"
  to = "/.netlify/functions/proxy"
  status = 200
